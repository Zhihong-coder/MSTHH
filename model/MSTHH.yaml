# =========================================================================
# MSTHH Configuration
# num_modalities=1  →  existing single-modal data  (flow + tod + dow, C=3)
# num_modalities=3  →  full multi-modal PEMS data  (flow+speed+OCC+tod+dow, C=5)
# =========================================================================

# ── METR-LA (207 nodes, speed + flow as 2 modalities) ───────────────────
METRLA:
  num_nodes: 207
  in_steps: 12
  out_steps: 12
  train_size: 0.7
  val_size: 0.1
  time_of_day: True
  day_of_week: True

  lr: 0.001
  weight_decay: 0.0003
  milestones: [30, 60, 80]
  lr_decay_rate: 0.1
  batch_size: 16
  max_epochs: 200
  early_stop: 30

  model_args:
    num_nodes: 207
    in_steps: 12
    out_steps: 12
    steps_per_day: 288
    num_modalities: 1       # change to 2 if speed is loaded as modality 1
    input_dim: 1
    output_dim: 1
    tod_embedding_dim: 24
    dow_embedding_dim: 24
    d_model: 64
    num_gcn_scales: 3
    num_gcn_layers: 3
    num_gcn_mamba_layers: 3
    num_decoder_layers: 2
    dropout: 0.1
    tau_intra: 0.1
    tau_inter: 0.1
    tau_inst: 0.1
    sigma1_init: 0.8
    sigma2_init: 2.0
    sigma3_init: 0.5

